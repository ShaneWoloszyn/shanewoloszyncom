<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photos — Shane Woloszyn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset & Base ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #FAF6EF;
      --ink:     #16161A;
      --navy:    #15294B;
      --navy-10: rgba(21,41,75,.10);
      --navy-20: rgba(21,41,75,.20);
      --green:   #3D8C5A;
      --rail-w:  320px;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 15px;
      line-height: 1.65;
      min-height: 100vh;
    }

    a {
      color: var(--navy);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; text-underline-offset: 3px; }

    /* ─── Layout ─────────────────────────────────────────────────────── */
    .page {
      display: flex;
      min-height: 100vh;
    }

    /* Left rail — same identity as home, no canvas here */
    .rail {
      width: var(--rail-w);
      min-width: var(--rail-w);
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 56px 40px;
      border-right: 1px solid var(--navy-20);
      background: var(--cream);
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(2.2rem, 3.5vw, 3rem);
      line-height: .96;
      letter-spacing: -.01em;
      color: var(--navy);
      margin-bottom: 18px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: .75;
      margin-bottom: 20px;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(61,140,90,.45); }
      50%      { box-shadow: 0 0 0 5px rgba(61,140,90,0); }
    }

    .tagline {
      font-size: 14px;
      line-height: 1.55;
      opacity: .7;
      margin-bottom: 32px;
      max-width: 230px;
    }

    .rail-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: auto;
    }
    .rail-link {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 400;
      color: var(--navy);
      transition: opacity .2s;
    }
    .rail-link:hover { opacity: .6; text-decoration: none; }
    .rail-link svg { opacity: .5; flex-shrink: 0; }

    .rail-nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-top: 32px;
      border-top: 1px solid var(--navy-20);
      margin-top: 40px;
    }
    .rail-nav a {
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: .5;
      transition: opacity .2s;
      padding: 3px 0;
    }
    .rail-nav a:hover,
    .rail-nav a.active { opacity: 1; color: var(--navy); text-decoration: none; }

    /* ─── Main ───────────────────────────────────────────────────────── */
    .main {
      flex: 1;
      padding: 56px 48px 80px;
    }

    .page-header {
      margin-bottom: 48px;
    }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 5vw, 4.5rem);
      line-height: .92;
      color: var(--navy);
      letter-spacing: -.02em;
      margin-bottom: 14px;
    }
    .page-sub {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: .35;
    }

    /* ─── Masonry Grid ───────────────────────────────────────────────── */
    /*
      REPLACE PHOTOS: swap out any src="https://picsum.photos/..." URL
      below with your own image paths, e.g. src="photos/shot-01.jpg"
      Each .photo-item can have its own aspect ratio via padding-bottom.
    */
    .gallery {
      columns: 3;
      column-gap: 10px;
    }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 10px;
      overflow: hidden;
      display: block;
    }

    .photo-item--hero {
      column-span: all;
      margin-bottom: 10px;
    }
    .photo-item--hero img {
      width: 100%;
      max-height: 85vh;
      object-fit: cover;
      display: block;
    }

    .photo-item img {
      width: 100%;
      display: block;
      transition: transform .45s cubic-bezier(.25,.46,.45,.94),
                  filter .45s ease;
      filter: brightness(1);
    }

    .photo-item:hover img {
      transform: scale(1.03);
      filter: brightness(.9);
    }

    /* ─── Entrance animation ──────────────────────────────────────────── */
    .fade-in {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp .55s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: none; }
    }
    .stagger-1 { animation-delay: .06s; }
    .stagger-2 { animation-delay: .12s; }
    .stagger-3 { animation-delay: .20s; }

    /* ─── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 1000px) {
      .gallery { columns: 2; }
    }

    @media (max-width: 800px) {
      .page { flex-direction: column; }
      .rail {
        width: 100%;
        min-width: 0;
        position: relative;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--navy-20);
        padding: 40px 24px 32px;
      }
      .main { padding: 36px 24px 64px; }
      .rail-links { flex-direction: row; flex-wrap: wrap; gap: 12px 20px; margin-bottom: 24px; }
      .rail-nav { flex-direction: row; gap: 16px; margin-top: 24px; padding-top: 24px; }
      .name { font-size: 2.6rem; }
      .gallery { columns: 2; }
    }

    @media (max-width: 480px) {
      .gallery { columns: 1; }
    }
  </style>
</head>

      <nav class="rail-nav fade-in stagger-3">
